# cargo-deny configuration - supply-chain policy.
# Run locally with `cargo deny check`; CI runs it on every PR.

[graph]
all-features = true

[advisories]
version = 2
# Fail on any active RUSTSEC advisory or yanked crate.
yanked = "deny"
ignore = []

[licenses]
version = 2
# Allowlist. The project is AGPL-3.0-or-later; AGPL is one-way compatible with
# the permissive licences below (they may be included in an AGPL work).
confidence-threshold = 0.9
allow = [
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"        # no `*` version requirements
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
