# Continuous integration - Rust portfolio
#
# Pinning policy: all GitHub Actions are pinned to a full commit SHA with a
# trailing version comment. Dependabot keeps both the SHA and the comment
# current.
#
# Layout: three jobs in parallel - `lint` (fmt + clippy), `test` (cargo test),
# and `gitleaks` (secret scanning). Lint failures surface in well under a
# minute; test runs concurrently rather than blocked behind it. Both Rust jobs
# share the same Swatinem/rust-cache namespace so registry + target/ are warm
# after the first run on a branch.

name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least-privilege at the workflow root.
permissions:
  contents: read

# Runner hardening: step-security/harden-runner is the first step of every job.
# It starts in `egress-policy: audit` (monitor + report outbound calls, block
# nothing) so the first real runs record each job's actual egress. Once that set
# is known - the StepSecurity insights, or the local tinyproxy capture in the
# runner-hardening notes - switch each job to `block` with its own
# `allowed-endpoints`. harden-runner is per-job, so each list stays minimal.

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Bun
        # build.rs invokes Bun + @tailwindcss/cli to compile the stylesheet.
        # Bun is a build-time dependency; production runtime is Rust-only.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.1'

      - name: Cache Bun install
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.HOME }}/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('apps/api/bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install Bun deps
        working-directory: apps/api
        run: bun install --frozen-lockfile

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.1'

      - name: Cache Bun install
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.HOME }}/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('apps/api/bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install Bun deps
        working-directory: apps/api
        run: bun install --frozen-lockfile

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo test
        run: cargo test --workspace

      # Keep the criterion benches compiling (they are not run here - see the
      # separate perf workflow / local `cargo bench`).
      - name: Compile benches
        run: cargo build --benches

  gitleaks:
    name: Secret scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # Installed via cargo (compiled from a --locked Cargo.lock) rather than an
      # unpinned third-party action - keeps the SHA-pinning policy intact. Swap
      # for a SHA-pinned EmbarkStudios/cargo-deny-action if one is ever pinned.
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.9

      # Enforces deny.toml: RUSTSEC advisories, yanked crates, the licence
      # allow-list, and registry/source bans. Previously only run locally via
      # scripts/check-all.sh (optional, skip-if-missing) - now gated in CI.
      - name: cargo deny check
        run: cargo deny check

  smoke:
    name: Container smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Builds the runtime image and probes happy/unhappy paths + the security
      # headers against the real container. Also the only PR-time build of the
      # image, so it catches Dockerfile / baked-asset regressions.
      - name: Smoke test
        run: ENGINE=docker bash scripts/smoke.sh

  e2e:
    name: Browser e2e + a11y (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build runtime image
        run: docker build -t profile:e2e -f Dockerfile .

      - name: Run app
        run: docker run -d --name profile-e2e -p 8080:8080 profile:e2e

      # Node is preinstalled on ubuntu-latest, so no (unpinned) setup-node action.
      - name: Install e2e deps
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Wait for app
        run: |
          for _ in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/healthz && break || sleep 1
          done

      - name: Run Playwright
        working-directory: tests/e2e
        env:
          BASE_URL: http://127.0.0.1:8080
        run: npm test

  coverage:
    name: Coverage (cargo-llvm-cov, informational)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.1'

      - name: Install Bun deps
        working-directory: apps/api
        run: bun install --frozen-lockfile

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install llvm-tools + cargo-llvm-cov
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked --version 0.8.7

      - name: Coverage summary
        run: cargo llvm-cov --workspace --summary-only
