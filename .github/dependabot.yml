# Dependabot v2 configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Conventions:
#   - All updates run weekly, Monday 09:00 Europe/London (one batch to review).
#   - Patch + minor updates are GROUPED per ecosystem; majors come as separate
#     PRs so they get individual review.
#   - Commit message prefixes use a Conventional-Commits scope per ecosystem,
#     so the squash-merge history stays readable.

version: 2

updates:
  # ---------------------------------------------------------------------------
  # Rust workspace (root Cargo.toml)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    reviewers:
      - "ICreateThunder"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "kind:chore"
      - "area:deps"
      - "lang:rust"
    groups:
      cargo-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"

  # ---------------------------------------------------------------------------
  # Web tooling - package.json (Tailwind CLI)
  # ---------------------------------------------------------------------------
  # Production runtime is Rust-only - these are dev dependencies that
  # build.rs consumes at compile time (Tailwind via `bun x @tailwindcss/cli`).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    reviewers:
      - "ICreateThunder"
    commit-message:
      prefix: "chore(deps-web)"
      include: "scope"
    labels:
      - "kind:chore"
      - "area:deps"
      - "area:web"
    groups:
      web-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"

  # ---------------------------------------------------------------------------
  # GitHub Actions workflows
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    reviewers:
      - "ICreateThunder"
    commit-message:
      prefix: "chore(deps-ci)"
      include: "scope"
    labels:
      - "kind:chore"
      - "area:deps"
      - "area:ci"
    groups:
      actions-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"

  # ---------------------------------------------------------------------------
  # Container images (Dockerfile at repo root)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    reviewers:
      - "ICreateThunder"
    commit-message:
      prefix: "chore(deps-docker)"
      include: "scope"
    labels:
      - "kind:chore"
      - "area:deps"
      - "area:deploy"
    groups:
      docker-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
